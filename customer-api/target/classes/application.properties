server.address=127.0.0.1
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/customer_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=customer_user
spring.datasource.password=customer_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.com.customer.api=INFO
logging.level.org.hibernate.SQL=WARN
